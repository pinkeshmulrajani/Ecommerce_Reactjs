<!DOCTYPE html>
<html lang="en">
<meta http-equiv="content-type" content="text/html;charset=UTF-8" />

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<meta name="description" content="Responsive Admin &amp; Dashboard Template based on Bootstrap 5">
	<meta name="author" content="AdminKit">
	<meta name="keywords" content="adminkit, bootstrap, bootstrap 5, admin, dashboard, template, responsive, css, sass, html, theme, front-end, ui kit, web">
	<link rel="preconnect" href="https://fonts.gstatic.com/">
	<link rel="shortcut icon" href="img/icons/icon-48x48.png" />
	<title></title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&amp;display=swap" rel="stylesheet">
	<link class="js-stylesheet" href="css/light.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/fancybox/fancybox.css">
</head>

<body data-theme="default" data-layout="fluid" data-sidebar-position="left" data-sidebar-layout="default">
	<div class="wrapper">
		<nav id="sidebar" class="sidebar js-sidebar">
			<div class="sidebar-content js-simplebar">
				<a class='sidebar-brand' href='index.html'>
					<span class="sidebar-brand-text align-middle">Administrator</span>
				</a>
				<ul class="sidebar-nav">
					<li class="sidebar-header">Modules</li>
					<li class="sidebar-item">
						<a class="sidebar-link">
							<span class="align-middle text-white">Dashboards</span>
						</a>
					</li>
				</ul>
			</div>
		</nav>
		<div class="main">
			<nav class="navbar navbar-expand navbar-light navbar-bg">
				<a class="sidebar-toggle js-sidebar-toggle">
					<i class="hamburger align-self-center"></i>
				</a>
			</nav>
			<main class="content">
				<div class="container-fluid p-0">
					<h1 class="h3 mb-3"></h1>
					<div class="row">
						<div class="col-12">
							<div class="card">
								<div class="card-header">
									<h4 class="card-title mb-0 text-dark">
										<span class="text-bg-primary p-1">Existing Categories</span> - Category management
									</h4>
								</div>
								<div class="card-body">
									<table class="table table-striped table-hover">
										<thead>
											<tr>
												<th>ID</th>
												<th>Title</th>
												<th>Photo</th>
												<th>Is Live</th>
												<th>Actions</th>
											</tr>
										</thead>
										<tbody>
											<tr>
												<td>1</td>
												<td>Category 1</td>
												<td>
													<a data-fancybox="gallery" href="https://picsum.photos/id/1035/1200/800">
														<img src="http://picsum.photos/50" class="img-fluid rounded" alt="Category Image" />
													</a>
												</td>
												<td>Yes</td>
												<td>
													<a href="site_edit_category.html" class="btn btn-sm btn-primary">Edit</a>
													<button class="btn btn-sm btn-danger">Delete</button>
												</td>
											</tr>
										</tbody>
									</table>
								</div>
							</div>
						</div>
					</div>
				</div>
			</main>
			<footer class="footer">
				<div class="container-fluid">
					<div class="row text-muted">
						<div class="col-12">
							<p class="text-center">Developed © the easylearn academy</p>
						</div>
					</div>
				</div>
			</footer>
		</div>
	</div>

	<script src="js/app.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/fancybox/fancybox.umd.js"></script>
	<script>
		Fancybox.bind("[data-fancybox]", {
			animated: true,
			dragToClose: true,
			Toolbar: {
				display: {
					left: [],
					middle: [],
					right: ["zoomIn", "zoomOut", "toggle1to1", "fullscreen", "close"]
				}
			}
		});
	</script>

</body>
</html>
