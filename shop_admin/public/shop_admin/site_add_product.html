<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<meta name="description" content="Responsive Admin &amp; Dashboard Template based on Bootstrap 5">
	<meta name="author" content="AdminKit">
	<meta name="keywords"
		content="adminkit, bootstrap, bootstrap 5, admin, dashboard, template, responsive, css, sass, html, theme, front-end, ui kit, web">
	<link rel="preconnect" href="https://fonts.gstatic.com/">
	<link rel="shortcut icon" href="img/icons/icon-48x48.png" />
	<title>Add Product</title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&amp;display=swap" rel="stylesheet">
	<link class="js-stylesheet" href="css/light.css" rel="stylesheet">
</head>
<body data-theme="default" data-layout="fluid" data-sidebar-position="left" data-sidebar-layout="default">

	<div class="wrapper">
		<nav id="sidebar" class="sidebar js-sidebar">
			<div class="sidebar-content js-simplebar">
				<a class="sidebar-brand" href="index.html">
					<span class="sidebar-brand-text align-middle">
						Administrator
					</span>
				</a>
				<ul class="sidebar-nav">
					<li class="sidebar-header">
						Modules
					</li>
					<li class="sidebar-item">
						<a class="sidebar-link">
							<span class="align-middle text-white">Dashboards</span>
						</a>
					</li>
				</ul>
			</div>
		</nav>
		<div class="main">
			<nav class="navbar navbar-expand navbar-light navbar-bg">
				<a class="sidebar-toggle js-sidebar-toggle">
					<i class="hamburger align-self-center"></i>
				</a>
			</nav>
			<main class="content">
				<div class="container-fluid p-0">
					<h1 class="h3 mb-3"></h1>
					<div class="row">
						<div class="col-12">
							<div class="card">
								<div class="card-header">
									<h4 class="card-title mb-0 text-dark">
										<span class="text-bg-primary p-1">Add Product</span> - Product Management
									</h4>
								</div>
								<div class="card-body">
									<form method="post" id="productForm">
										<!-- Row 1: Title, Price, Stock -->
										<div class="row">
											<div class="col-md-4 mb-3">
												<label for="title" class="form-label">Title <span class="text-danger">*</span></label>
												<input type="text" class="form-control" id="title" name="title" 
													placeholder="Enter product title" required 
													minlength="3" maxlength="100"
													pattern="[a-zA-Z0-9\s\-]+"
													title="Title should contain letters, numbers, spaces or hyphens only" />
												<small class="form-text text-muted">Min 3 characters, Max 100 characters</small>
											</div>
											<div class="col-md-4 mb-3">
												<label for="price" class="form-label">Price <span class="text-danger">*</span></label>
												<input type="number" class="form-control" id="price" name="price" 
													placeholder="0.00" required step="0.01" min="0" 
													title="Please enter a valid price" />
												<small class="form-text text-muted">Minimum value: 0</small>
											</div>
											<div class="col-md-4 mb-3">
												<label for="stock" class="form-label">Stock <span class="text-danger">*</span></label>
												<input type="number" class="form-control" id="stock" name="stock" 
													placeholder="0" required step="1" min="0" 
													title="Please enter a valid stock quantity" />
												<small class="form-text text-muted">Minimum value: 0</small>
											</div>
										</div>

										<!-- Row 2: Weight, Size, Photo -->
										<div class="row">
											<div class="col-md-4 mb-3">
												<label for="weight" class="form-label">Weight (kg) <span class="text-danger">*</span></label>
												<input type="number" class="form-control" id="weight" name="weight" 
													placeholder="0.00" required step="0.01" min="0" 
													title="Please enter a valid weight" />
												<small class="form-text text-muted">Minimum value: 0</small>
											</div>
											<div class="col-md-4 mb-3">
												<label for="size" class="form-label">Size <span class="text-danger">*</span></label>
												<input type="text" class="form-control" id="size" name="size" 
													placeholder="e.g., S, M, L, XL" required 
													minlength="1" maxlength="50"
													title="Please enter a valid size" />
												<small class="form-text text-muted">Max 50 characters</small>
											</div>
											<div class="col-md-4 mb-3">
												<label for="photo" class="form-label">Photo <span class="text-danger">*</span></label>
												<input type="file" class="form-control" id="photo" name="photo" 
													required accept="image/*"
													title="Please select an image file" />
												<small class="form-text text-muted">Accepted formats: JPG, PNG, GIF, WebP</small>
											</div>
										</div>

										<!-- Row 3: Details -->
										<div class="row">
											<div class="col-12 mb-3">
												<label for="details" class="form-label">Details <span class="text-danger">*</span></label>
												<textarea class="form-control" id="details" name="details" rows="4"
													placeholder="Enter product details and description" required 
													minlength="10" maxlength="1000"
													title="Details should be between 10 and 1000 characters"></textarea>
												<small class="form-text text-muted">Min 10 characters, Max 1000 characters</small>
											</div>
										</div>

										<!-- Row 4: Is Live -->
										<div class="row">
											<div class="col-12 mb-3">
												<label class="form-label">Is Live? <span class="text-danger">*</span></label>
												<div>
													<input class="form-check-input" type="radio" name="is_live" id="yes" value="1" required>
													<label class="form-check-label" for="yes">Yes</label>
												</div>
												<div>
													<input class="form-check-input" type="radio" name="is_live" id="no" value="0" required>
													<label class="form-check-label" for="no">No</label>
												</div>
											</div>
										</div>

										<div class="row">
											<div class="col-12">
												<button type="submit" class="btn btn-primary">
													<i class="feather-check"></i> Save Product
												</button>
												<button type="reset" class="btn btn-secondary">
													<i class="feather-x"></i> Clear all
												</button>
											</div>
										</div>
									</form>
								</div>
							</div>
						</div>
					</div>
				</div>
			</main>
			<footer class="footer">
				<div class="container-fluid">
					<div class="row text-muted">
						<div class="col-12">
							<p class="text-center">Developed @ the easylearn academy</p>
						</div>
					</div>
				</div>
			</footer>
		</div>
	</div>
	
	<script src="js/app.js"></script>
	<script>
		document.getElementById('productForm').addEventListener('submit', function(e) {
			const fileInput = document.getElementById('photo');
			if (fileInput.files.length === 0) {
				e.preventDefault();
				alert('Please select a photo');
			}
		});
	</script>
</body>
</html>
